<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asgard — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #c8c5be;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    flex-direction: column;
    gap: 20px;
    -webkit-app-region: drag;
  }
  .icon { font-size: 56px; opacity: .4; }
  h1 { font-size: 22px; font-weight: 600; color: #e8e4dd; }
  p  { font-size: 14px; opacity: .6; text-align: center; max-width: 320px; line-height: 1.6; }
  button {
    margin-top: 8px;
    padding: 10px 24px;
    background: #e8c44d;
    color: #0a0a1a;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    -webkit-app-region: no-drag;
    transition: opacity .15s;
  }
  button:hover { opacity: .85; }
</style>
</head>
<body>
  <div class="icon">&#9889;</div>
  <h1>No connection</h1>
  <p>Can't reach Asgard right now.<br>Check your internet and try again.</p>
  <button onclick="location.reload()">Try again</button>
  <script>
    setInterval(() => {
      fetch('https://asgard.pgallivan.workers.dev/api/health', { cache: 'no-store' })
        .then(() => location.href = 'https://asgard.pgallivan.workers.dev')
        .catch(() => {});
    }, 10000);
  </script>
</body>
</html>
